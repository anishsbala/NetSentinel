name: netsentinel

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: netsentinel-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${SQLSERVER_SA_PASSWORD:?Copy .env.example to .env}"
    ports:
      - "${SQLSERVER_PORT:-1433}:1433"
    volumes:
      - netsentinel-sql-data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  netsentinel-sql-data:
