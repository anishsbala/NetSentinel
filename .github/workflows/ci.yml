name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

permissions:
  contents: read

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore NetSentinel.sln
      - run: dotnet build NetSentinel.sln --configuration Release --no-restore
      - run: dotnet test NetSentinel.sln --configuration Release --no-build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/requirements-dev.txt
      - run: pip install -r python/requirements-dev.txt
      - run: ruff check python
      - run: pytest python/tests
